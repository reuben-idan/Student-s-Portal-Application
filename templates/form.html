{% extends "base.html" %}
{% block title %}Apply | Student Portal{% endblock %}

{% block content %}
<section class="form-section">
  <h2>Student Application Form</h2>

  {% if error %}
    <p class="error-msg">{{ error }}</p>
  {% endif %}

  <form id="portal-form" action="{{ url_for('submit') }}" method="POST" enctype="multipart/form-data" novalidate>

    <div class="form-row">
      <div class="form-group">
        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" placeholder="Enter first name" required/>
      </div>
      <div class="form-group">
        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" placeholder="Enter last name" required/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter email" required/>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" name="phone" placeholder="Enter phone number" required/>
      </div>
    </div>

    <div class="form-group">
      <label for="address">Address</label>
      <input type="text" id="address" name="address" placeholder="Enter home address" required/>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" required/>
      </div>
      <div class="form-group">
        <label for="age">Age</label>
        <input type="number" id="age" name="age" min="10" max="100" placeholder="Enter age" required/>
      </div>
    </div>

    <!-- Gender: radio buttons -->
    <div class="form-group">
      <label>Gender</label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="Male" required/> Male</label>
        <label><input type="radio" name="gender" value="Female"/> Female</label>
        <label><input type="radio" name="gender" value="Other"/> Other</label>
      </div>
    </div>

    <!-- Dynamic select boxes populated via async JS -->
    <div class="form-row">
      <div class="form-group">
        <label for="department">Department</label>
        <select id="department" name="department" required>
          <option value="">-- Loading... --</option>
        </select>
      </div>
      <div class="form-group">
        <label for="level">Level</label>
        <select id="level" name="level" required>
          <option value="">-- Loading... --</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="region">Region</label>
      <select id="region" name="state" required>
        <option value="">-- Loading... --</option>
      </select>
    </div>

    <div class="form-group">
      <label for="image">Passport Photograph</label>
      <input type="file" id="image" name="image" accept="image/*" required/>
    </div>

    <button type="submit" class="btn">Submit Application</button>
  </form>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/form.js') }}"></script>
{% endblock %}

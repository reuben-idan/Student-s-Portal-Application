<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Student Portal{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

  <!-- Top Navbar -->
  <nav class="navbar">
    <a href="{{ url_for('landing') }}" class="logo">StudentPortal</a>
    <ul>
      <li><a href="{{ url_for('landing') }}">Home</a></li>
      <li><a href="{{ url_for('form') }}">Apply</a></li>
      <li><a href="{{ url_for('students') }}">Students</a></li>
    </ul>
  </nav>

  <!-- Page Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 StudentPortal. All rights reserved.</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
